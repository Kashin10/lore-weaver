{% extends 'base.html' %}
{% block title %}New Project{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('index') }}" class="back-link">← Back to Dashboard</a>
  <h1 class="page-title">Start a New Project</h1>
  <p class="page-sub">Give your project a name and pick a primary genre to get started.</p>
</div>

<div class="form-container form-slim">
  <form method="POST" action="{{ url_for('create_project') }}">
    <div class="form-section">
      <div class="form-group">
        <label for="title" class="form-label">Project Title</label>
        <input type="text" id="title" name="title" class="form-input" placeholder="e.g. Shattered Realm, Echoes of the Void..." required>
        <span class="form-hint">You can change this — the AI will also suggest a title when generating your narrative.</span>
      </div>
      <div class="form-group">
        <label for="genre" class="form-label">Primary Genre</label>
        <select id="genre" name="genre" class="form-input form-select">
          <option value="Fantasy">⚔ Fantasy</option>
          <option value="Sci-Fi">🚀 Sci-Fi</option>
          <option value="Horror">🕷 Horror</option>
          <option value="Action-Adventure">🏹 Action-Adventure</option>
          <option value="RPG">🎭 RPG</option>
          <option value="Stealth/Thriller">🗡 Stealth / Thriller</option>
          <option value="Post-Apocalyptic">☢ Post-Apocalyptic</option>
          <option value="Cyberpunk">🌆 Cyberpunk</option>
          <option value="Mythology">🏛 Mythology</option>
          <option value="Western">🤠 Western</option>
          <option value="Survival">🌿 Survival</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-lg">Continue to Narrative Specs →</button>
    </div>
  </form>
</div>
{% endblock %}
